<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Content...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 30px;
            animation: pulse 2s ease-in-out infinite;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .loading-text {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .loader {
            width: 300px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            margin: 0 auto 20px;
        }

        .loader-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffffff 0%, #e0e0e0 100%);
            border-radius: 10px;
            animation: loading 3s ease-in-out forwards;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .percentage {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
            letter-spacing: 2px;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
            font-style: italic;
        }

        @keyframes loading {
            0% {
                width: 0%;
            }
            20% {
                width: 25%;
            }
            40% {
                width: 45%;
            }
            60% {
                width: 70%;
            }
            80% {
                width: 90%;
            }
            100% {
                width: 100%;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        .dots {
            display: inline-block;
        }

        .dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% {
                content: '';
            }
            40% {
                content: '.';
            }
            60% {
                content: '..';
            }
            80%, 100% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📄</div>
        <h1>Preparing Your Content</h1>
        <p class="loading-text">Please wait while we load your files<span class="dots"></span></p>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
        
        <div class="percentage" id="percentage">0%</div>
        <div class="status" id="status">Initializing...</div>
    </div>

    <script>
        const statuses = [
            "Initializing...",
            "Connecting to server...",
            "Retrieving data...",
            "Processing files...",
            "Almost there..."
        ];

        let progress = 0;
        const percentageEl = document.getElementById('percentage');
        const statusEl = document.getElementById('status');

        const interval = setInterval(() => {
            progress += Math.random() * 15 + 5;
            if (progress >= 100) {
                progress = 100;
                percentageEl.textContent = '100%';
                statusEl.textContent = 'Complete!';
                clearInterval(interval);
                
                // Redirect after a brief pause
                setTimeout(() => {
                    window.location.href = 'https://youtu.be/Aq5WXmQQooo?si=w7el68P4H85MjpFX';
                }, 500);
            } else {
                percentageEl.textContent = Math.floor(progress) + '%';
                const statusIndex = Math.floor((progress / 100) * (statuses.length - 1));
                statusEl.textContent = statuses[statusIndex];
            }
        }, 300);
    </script>
</body>
</html>
